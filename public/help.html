<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help - Images 2.0</title>
    <style>
        :root {
            --primary: #1a365d;
            --secondary: #e2e8f0;
            --accent: #4299e1;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            display: flex;
            min-height: 100vh;
            background-color: #f8fafc;
        }
        .sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            padding: 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
            max-width: 800px;
            background: #fff;
            min-height: 100vh;
        }
        h1 {
            color: var(--primary);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--secondary);
        }
        h2 {
            color: var(--primary);
            margin: 2rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--secondary);
        }
        h3 {
            color: var(--primary);
            margin: 1.5rem 0 0.5rem;
        }
        .menu {
            list-style: none;
        }
        .menu a {
            display: block;
            padding: 8px 12px;
            color: #4a5568;
            text-decoration: none;
            border-radius: 4px;
            margin: 4px 0;
        }
        .menu a:hover, .menu a.active {
            background-color: #ebf8ff;
            color: var(--accent);
        }
        .menu .submenu {
            list-style: none;
            padding-left: 20px;
            margin: 4px 0;
        }
        .menu .submenu a {
            padding: 6px 12px;
            font-size: 0.9em;
        }
        .image-container {
            text-align: center;
            margin: 20px 0;
        }
        .image-container img {
            max-width: 100%;
            height: auto;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
        }
        .image-right {
            float: right;
            margin: 0 0 20px 20px;
            max-width: 300px;
        }
        .clearfix::after {
            content: "";
            display: table;
            clear: both;
        }
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }
            .content {
                margin-left: 0;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <h2>Inhoudsopgave</h2>
        <ul class="menu" id="menu">
            <!-- Menu items will be generated by JavaScript -->
        </ul>
    </nav>
    
    <main class="content" id="content">
        <!-- Content will be generated by JavaScript -->
    </main>

    <script>
        // Content data
        const content = [
            {
                id: 'intro',
                title: 'Introductie',
                content: `
                    <p>Images 2.0 werkt net als images.exe in enkele stappen:</p>
                    <ol style="margin-left: 20px; margin-bottom: 20px;">
                        <li>Kiezen beeldbank</li>
                        <li>Kiezen map voor upload</li>
                        <li>Bestanden voor upload</li>
                        <li>Images Type</li>
                        <li>Format combinatie</li>
                        <li>Upload</li>
                    </ol>
                    
                    <p>Je start Images 2.0 door in de beeldbank te klikken op de knop Images 2.0.</p>
                    <p>Deze wordt door de beheerder geactiveerd in cfg-cbs.pl.</p>
                    <div class="image-container">
                        <image src="images/images20.jpg">
                    </div>
                `
            },
            {
                id: 'stappen',
                title: 'Stappen',
                content: `
                    <h2 id="stap1">Stap 1 - Kiezen beeldbank</h2>
                    <p>De beeldbank wordt automatisch gekozen indien Images gestart wordt vanuit de beeldbank zelf.</p>
                    <div class="image-container">
                        <image src="images/stap1.jpg">
                    </div>
                    
                    <h2 id="stap2">Stap 2 - Kiezen map voor upload</h2>
                    <p>Je hebt de keuze uit:</p>
                    <ul style="margin-left: 20px; margin-bottom: 20px;">
                        <li>Root</li>
                        <li>Nieuwe map</li>
                        <li>Andere map</li>
                    </ul>
                    
                    <p>Als je alleen de root hebt, is de keuze tussen de root of een nieuwe submap maken.</p>
                    <p>Zijn er al submappen, dan kun je een van deze kiezen.</p>
                    <div class="image-container">
                        <image src="images/stap2.jpg">
                    </div>
                    
                    <h2 id="stap3">Stap 3 - Bestanden voor upload</h2>
                    <p>Hier kies je de images die je wil uploaden.</p>
                    <p>Deze kunnen overal op je device staan en zullen niet aangepast worden.</p>
                    <p>De geaccepteerde typen zijn JPEG, BMP, TIF, WEBP, PNG.</p>
                    <div class="image-container">
                        <image src="images/stap3.jpg">
                    </div>
                    
                    <h2 id="stap4">Stap 4 - Type override</h2>
                    <p>Hier wordt het type dat automatisch erkend is op basis van de image naam aangegeven.</p>
                    <p>Deze kun je overrulen naar type C of E.</p>
                    <div class="image-container">
                        <image src="images/stap4.jpg">
                    </div>
                    
                    <h2 id="stap5">Stap 5 - Format combinatie</h2>
                    <p>Hier maak je de keuze voor het formaat combinatie die je wil gebruiken.</p>
                    <div class="image-container">
                        <image src="images/stap5.jpg">
                    </div>
                    
                    <h2 id="stap6">Stap 6 - Upload</h2>
                    <p>Nu worden de images verwerkt, geupload en indien daar voor gekozen records aangemaakt.</p>
                    <div class="image-container">
                        <image src="images/stap6.jpg">
                    </div>
                `
            }
        ];

        // Generate menu
        const menuElement = document.getElementById('menu');
        const contentElement = document.getElementById('content');
        
        // Generate menu items and content
        content.forEach((section, index) => {
            // Add menu item
            const menuItem = document.createElement('li');
            menuItem.innerHTML = `<a href="#${section.id}" ${index === 0 ? 'class="active"' : ''}>${section.title}</a>`;
            menuElement.appendChild(menuItem);
            
            // Add content section
            const sectionElement = document.createElement('section');
            sectionElement.id = section.id;
            sectionElement.innerHTML = `
                <h2>${section.title}</h2>
                ${section.content}
            `;
            contentElement.appendChild(sectionElement);
        });

        // Helper function to get correct image path
        function getImagePath(filename) {
            // Always use relative path to images directory
            return `./images/${filename}`;
        }

        // Process image placeholders
        function processImages() {
            // Process <image=filename> tags (centered)
            const imageTags = document.querySelectorAll('image');
            imageTags.forEach(tag => {
                const filename = tag.getAttribute('src') || '';
                const img = document.createElement('img');
                img.src = getImagePath(filename);
                img.alt = '';
                
                const container = document.createElement('div');
                container.className = 'image-container';
                container.appendChild(img);
                
                tag.parentNode.replaceChild(container, tag);
            });
            
            // Process <imagevast=filename> tags (right-aligned)
            const imageVastTags = document.querySelectorAll('imagevast');
            imageVastTags.forEach(tag => {
                const filename = tag.getAttribute('src') || '';
                const img = document.createElement('img');
                img.src = getImagePath(filename);
                img.alt = '';
                
                const container = document.createElement('div');
                container.className = 'image-right';
                container.appendChild(img);
                
                // Add clearfix after the tag
                const clearfix = document.createElement('div');
                clearfix.className = 'clearfix';
                
                tag.parentNode.insertBefore(clearfix, tag);
                tag.parentNode.insertBefore(container, clearfix);
                tag.parentNode.removeChild(tag);
            });
        }

        // Initialize
        window.onload = function() {
            processImages();
            
            // Smooth scrolling for anchor links
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    
                    const targetId = this.getAttribute('href');
                    const targetElement = document.querySelector(targetId);
                    
                    if (targetElement) {
                        // Update active menu item
                        document.querySelectorAll('.menu a').forEach(link => {
                            link.classList.remove('active');
                        });
                        this.classList.add('active');
                        
                        // Smooth scroll to target
                        window.scrollTo({
                            top: targetElement.offsetTop - 20,
                            behavior: 'smooth'
                        });
                    }
                });
            });
            
            // Update active menu item on scroll
            window.addEventListener('scroll', function() {
                const scrollPosition = window.scrollY;
                
                content.forEach(section => {
                    const element = document.getElementById(section.id);
                    if (element) {
                        const rect = element.getBoundingClientRect();
                        if (rect.top <= 100 && rect.bottom >= 100) {
                            // Update active menu item
                            document.querySelectorAll('.menu a').forEach(link => {
                                link.classList.remove('active');
                                if (link.getAttribute('href') === `#${section.id}`) {
                                    link.classList.add('active');
                                }
                            });
                        }
                    }
                });
            });
        };
    </script>
</body>
</html>
