<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handleiding - Images 2.0</title>
    <style>
        :root {
            --primary: #1a365d;
            --secondary: #e2e8f0;
            --accent: #4299e1;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            display: flex;
            min-height: 100vh;
            background-color: #f8fafc;
        }
        .sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            padding: 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
            max-width: 800px;
            background: #fff;
            min-height: 100vh;
        }
        h1 {
            color: var(--primary);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--secondary);
        }
        h2 {
            color: var(--primary);
            margin: 2rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--secondary);
        }
        .menu {
            list-style: none;
        }
        .menu a {
            display: block;
            padding: 8px 12px;
            color: #4a5568;
            text-decoration: none;
            border-radius: 4px;
            margin: 4px 0;
        }
        .menu a:hover, .menu a.active {
            background-color: #ebf8ff;
            color: var(--accent);
        }
        .menu .submenu {
            list-style: none;
            padding-left: 20px;
            margin: 4px 0;
        }
        .menu .submenu a {
            padding: 6px 12px;
            font-size: 0.9em;
        }
        .image-container {
            text-align: center;
            margin: 20px 0;
        }
        .image-container img {
            max-width: 100%;
            height: auto;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
        }
        .image-right {
            float: right;
            margin: 0 0 20px 20px;
            max-width: 300px;
        }
        .clearfix::after {
            content: "";
            display: table;
            clear: both;
        }
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }
            .content {
                margin-left: 0;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <h2>Inhoudsopgave</h2>
        <ul class="menu" id="menu">
            <!-- Menu items will be generated by JavaScript -->
        </ul>
    </nav>
    
    <main class="content" id="content">
        <!-- Content will be generated by JavaScript -->
    </main>

    <script>
        // Content data
        const content = [
            {
                id: 'installatie',
                title: 'Installatie',
                content: `
                    <p>Images 2.0 wordt vanuit ZCBS geinstalleerde en geupdate.</p>
                  <br>
                    <h3>First start</h3>
                    <p>Je kunt de Images 2.0 opstarten door via de beeldbank op de button Images te klikken. Je moet hiervoor wel ingelogd zijn.</p>
                    <div class="image-container">
                        <image src="images/images20.jpg">
                    </div>
                    
                    <p>Je kunt de app ook opstarten door eerst in te loggen op één van de beeldbanken en daarna te navigeren naar &lt;root&gt;\zcbs_frontend.</p>
                    <p>Bij het opstarten zie je het volgende:</p>
                    <div class="image-container">
                        <image src="images/eerstestart.jpg">
                    </div>
                    
                    <p>Dit voorbeeld geeft aan dat de PHP versie hoger is dan 8 en dat de backend online is.</p>
                    <p>Indien PHP lager is dan 8 of onbekend is, moet je de PHP-versie en -installatie op je server controleren.</p>
                    <p>Indien de backend offline is, betekent dit dat de zcbs_backend.php niet goed is gevonden of niet werkt.</p>
                    
                    <p>Rechtsboven zie je 2 iconen: de ? en de D.</p>
                    <p>De ? verwijst naar deze handleiding en de D verwijst naar de debug-pagina.</p>
                    <p>Met de debug-pagina kun je de backend verder testen.</p>
                    <div class="image-container">
                        <!-- debug.jpg not found in images directory -->
                    </div>
                    <p>Om in te loggen gebruik je alleen het versie deel van de frontend versie als wachtwoord, bijvoorbeeld: 0.0.24</p>
                `
            },
            {
                id: 'inlezen-beeldbanken',
                title: 'Inlezen beeldbanken',
                content: `
                    <p>Door op 'Volgende' te kiezen, kom je op een scherm met de gevonden beeldbanken.</p>
                    <div class="image-container">
                        <!-- Beeldbanken.jpg not found in images directory -->
                    </div>
                    <p>Hier kun je zien welke beeldbanken zijn gevonden. (Het kan zijn dat je hier moet scrollen om ze allemaal te zien.)</p>
                    <p>Daarna klik je op 'Installatie voltooien'.</p>
                    <p>Je komt dan op de Images 2.0 startpagina.</p>
                    <div class="image-container">
                        <image src="images/start.jpg">
                    </div>
                    <p>Voor het helpbestand van de app klik je op de i-icon rechtsboven.</p>
                    <div class="image-container">
                        <image src="images/iicon.jpg">
                    </div>
                `
            },
            {
                id: 'instellingen',
                title: 'Instellingen',
                content: `
                    <p>Hier wordt uitgelegd welke instellingen je kunt aanpassen in de Images 2.0 applicatie.</p>
                    <p>Om naar de instellingen te gaan, klik je op het tandwiel rechtsboven.</p>
                    <div class="image-container">
                        <image src="images/tandwiel.jpg">
                    </div>
                `
            },
            {
                id: 'beveiliging',
                title: 'Beveiliging',
                content: `
                    <div class="image-container">
                        <image src="images/beveiliging.jpg">
                    </div>
                    <p><strong>Het instellen van een wachtwoord is niet verplicht.</strong></p>
                    <p>Hier kun je de instellingen beveiligen met een wachtwoord. Deze moet je twee keer invoeren.</p>
                    <p>Daarna kun je alleen nog bij de instellingen komen als je dit wachtwoord weet.</p>
                `
            },
            {
                id: 'upload-instellingen',
                title: 'Upload instellingen',
                content: `
                    <h3>Small niet uploaden</h3>
                    <p>Als deze optie actief is, worden de kleine afbeeldingen niet geüpload naar de server.</p>
                    
                    <h3>JPEG-kwaliteit</h3>
                    <p>Hier kies je de JPEG-compressie voor de te uploaden images.</p>
                    <p>Standaard is dit 70%. Je kunt kiezen tussen 30% en 90%.</p>
                `
            },
            {
                id: 'layout',
                title: 'Layout',
                content: `
                    <p>Hier kun je het lettertype aanpassen. Standaard is dit 18px. Je kunt dit aanpassen tussen 12px en 40px.</p>
                `
            },
            {
                id: 'format-combinaties',
                title: 'Format combinaties',
                content: `
                    <p>Hier kun je per beeldbank de resoluties instellen.</p>
                    <p>Ook kun je via het <image src="images/icmove.jpg" style="height: 16px; vertical-align: middle;"> icoon de volgorde van de beeldbanken aanpassen door deze te slepen.</p>
                    
                    <p>Via de tabel aan de linkerkant kun je de resolutie kiezen door het nummer van de combinatie bij de betreffende beeldbank in te voeren. Bijvoorbeeld, voor resolutie:</p>
                    <p>2 Klein (100x100), Middel (700x500), Groot (3000x2000) in beeldbank 'demo' doe je:</p>
                    <div class="image-container">
                        <image src="images/res01.jpg">
                    </div>
                    
                    <p>Ook kun je een beeldbank uitschakelen door een '-' in het veld 'Format' in te vullen.</p>
                    <p>Een beeldbank die is uitgeschakeld kan door Images 2.0 niet worden gebruikt.</p>
                    <div class="image-container">
                        <image src="images/disabled.jpg">
                    </div>
                    
                    <p>Als er een 0 is ingevuld, kan de beeldbank gekozen worden en moeten de formatcombinaties tijdens het uploadproces worden gekozen.</p>
                `
            },
            {
                id: 'insert',
                title: 'Insert',
                content: `
                    <p>Insert kan worden gebruikt om:</p>
                    <ul style="margin-left: 20px; margin-bottom: 20px;">
                        <li>Bij upload van images met nieuwe record - default waarden van andere velden automatisch invoeren</li>
                        <li>Bij upload van images zonder record - default waarden van velden automatisch invoeren</li>
                        <li>Waarden van velden invoeren op basis van If vergelijken</li>
                    </ul>
                    
                    <h3>Voorbeeld 1</h3>
                    <p>Bij een nieuwe record willen we plaatsing op internet op ja zetten.</p>
                    <p>Vanuitgaande dat plaatsing op internet VELD 21 is, wordt een insert gemaakt voor een vast veld waar VELD 21 = 1.</p>
                    
                    <h3>Voorbeeld 2</h3>
                    <p>Bij uploaden van een image waar de record al bestaat:</p>
                    <ul style="margin-left: 20px; margin-bottom: 20px;">
                        <li>Net als voorbeeld 1 een vast veld invoeren</li>
                        <li>OF op basis van een IF statement een veld invoeren</li>
                    </ul>
                    
                    <p>Stel:</p>
                    <p>Vanuitgaande dat VELD 12 plaats is en VELD 21 Plaatsing op internet.</p>
                    <p>Kun je de IF maken: IF VELD 12 = "Amsterdam" THEN VELD 21 = 1</p>
                    
                    <h3>Configureren</h3>
                    <p>Inserts kun je configureren en activeren in het instellingen scherm.</p>
                    <p>Eerst moet je deze configureren door bij de betreffende beeldbank op de icon <image src="images/ins1.jpg" style="height: 20px; vertical-align: middle;"> te klikken.</p>
                    <div class="image-container">
                        <image src="images/ins1.jpg">
                    </div>
                    
                    <p>Als je deze opslaat wordt de Insert meteen actief.</p>
                    <p>Deze kun je door op de icon <image src="images/ins2.jpg" style="height: 20px; vertical-align: middle;"> deactiveren terwijl de config wordt bewaard.</p>
                    <div class="image-container">
                        <image src="images/ins2.jpg">
                    </div>
                    
                    <p>Als deze actief is en je upload images, komt in stap 6 de melding dat insert actief is en uitgevoerd wordt:</p>
                    <div class="image-container">
                        <image src="images/ins3.jpg">
                    </div>
                `
            }
        ];

        // Generate menu
        const menuElement = document.getElementById('menu');
        const contentElement = document.getElementById('content');
        
        // Generate menu items and content
        content.forEach((section, index) => {
            // Add menu item
            const menuItem = document.createElement('li');
            menuItem.innerHTML = `<a href="#${section.id}" ${index === 0 ? 'class="active"' : ''}>${section.title}</a>`;
            menuElement.appendChild(menuItem);
            
            // Add content section
            const sectionElement = document.createElement('section');
            sectionElement.id = section.id;
            sectionElement.innerHTML = `
                <h2>${section.title}</h2>
                ${section.content}
            `;
            contentElement.appendChild(sectionElement);
        });

        // Helper function to get correct image path
        function getImagePath(filename) {
            // Always use relative path to images directory
            return `./images/${filename}`;
        }

        // Process image placeholders
        function processImages() {
            // Process <image=filename> tags (centered)
            const imageTags = document.querySelectorAll('image');
            imageTags.forEach(tag => {
                const filename = tag.getAttribute('src') || '';
                const img = document.createElement('img');
                img.src = getImagePath(filename);
                img.alt = '';
                
                const container = document.createElement('div');
                container.className = 'image-container';
                container.appendChild(img);
                
                tag.parentNode.replaceChild(container, tag);
            });
            
            // Process <imagevast=filename> tags (right-aligned)
            const imageVastTags = document.querySelectorAll('imagevast');
            imageVastTags.forEach(tag => {
                const filename = tag.getAttribute('src') || '';
                const img = document.createElement('img');
                img.src = getImagePath(filename);
                img.alt = '';
                
                const container = document.createElement('div');
                container.className = 'image-right';
                container.appendChild(img);
                
                // Add clearfix after the tag
                const clearfix = document.createElement('div');
                clearfix.className = 'clearfix';
                
                tag.parentNode.insertBefore(clearfix, tag);
                tag.parentNode.insertBefore(container, clearfix);
                tag.parentNode.removeChild(tag);
            });
        }

        // Initialize
        window.onload = function() {
            processImages();
            
            // Smooth scrolling for anchor links
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    
                    const targetId = this.getAttribute('href');
                    const targetElement = document.querySelector(targetId);
                    
                    if (targetElement) {
                        // Update active menu item
                        document.querySelectorAll('.menu a').forEach(link => {
                            link.classList.remove('active');
                        });
                        this.classList.add('active');
                        
                        // Smooth scroll to target
                        window.scrollTo({
                            top: targetElement.offsetTop - 20,
                            behavior: 'smooth'
                        });
                    }
                });
            });
            
            // Update active menu item on scroll
            window.addEventListener('scroll', function() {
                const scrollPosition = window.scrollY;
                
                content.forEach(section => {
                    const element = document.getElementById(section.id);
                    if (element) {
                        const rect = element.getBoundingClientRect();
                        if (rect.top <= 100 && rect.bottom >= 100) {
                            // Update active menu item
                            document.querySelectorAll('.menu a').forEach(link => {
                                link.classList.remove('active');
                                if (link.getAttribute('href') === `#${section.id}`) {
                                    link.classList.add('active');
                                }
                            });
                        }
                    }
                });
            });
        };
    </script>
</body>
</html>
